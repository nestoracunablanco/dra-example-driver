---
apiVersion: v1
kind: Namespace
metadata:
  name: vm-test

---
# ResourceClaimTemplate for a vGPU (type=vgpu, has mdevUUID)
apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  namespace: vm-test
  name: vgpu-claim-template
spec:
  spec:
    devices:
      requests:
      - name: vgpu
        exactly:
          deviceClassName: gpu.example.com
          selectors:
          - cel:
              expression: 'device.attributes["gpu.example.com"].type == "vgpu"'
---
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  namespace: vm-test
  name: testvm
spec:
  runStrategy: Halted
  template:
    metadata:
      labels:
        kubevirt.io/size: small
        kubevirt.io/domain: testvm
    spec:
      resourceClaims:
      - name: vgpu-claim
        resourceClaimTemplateName: vgpu-claim-template
      readinessProbe:
        tcpSocket:
          port: 22
        initialDelaySeconds: 0
        periodSeconds: 5
        timeoutSeconds: 5
        successThreshold: 3
        failureThreshold: 1
      domain:
        devices:
          disks:
            - name: containerdisk
              disk:
                bus: virtio
            - name: cloudinitdisk
              disk:
                bus: virtio
          hostDevices:
          - claimName: vgpu-claim
            name: vgpu
            requestName: vgpu
        resources:
          requests:
            memory: 256M
      volumes:
        - name: containerdisk
          containerDisk:
            image: quay.io/containerdisks/fedora:43
        - name: cloudinitdisk
          cloudInitNoCloud:
            userData: |-
              #cloud-config
              system_info:
                default_user:
                  name: test
              password: test
              chpasswd:
                expire: false
              ssh_pwauth: yes
              ssh_authorized_keys:
                - ssh-rsa the public key
